<!doctype html>
<html lang="de" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wetter-App</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-white text-gray-800">
    <header
      class="container sticky top-0 z-10 bg-gray-800 text-white p-4 flex justify-between items-center"
    >
      <h1 class="text-2xl font-bold">
        Wetter-App <span class="text-xs italic">by Michael Kuscher</span>
      </h1>

      <button
        id="burger"
        type="button"
        aria-expanded="false"
        aria-controls="navBar"
        aria-label="Navigationsmenü öffnen"
        class="hamburger hamburger--collapse lg:hidden"
      >
        <span class="hamburger-box" aria-hidden="true">
          <span class="hamburger-inner"></span>
        </span>
      </button>

      <nav
        id="navBar"
        class="flex text-right justify-center lg:justify-end gap-2 lg:gap-4 hidden"
        aria-label="Hauptnavigation"
      >
        <a class="navhover" href="#hero">Home</a>
        <a class="navhover" href="#about">Über Mich</a>
        <a class="navhover" href="#skills">Skills</a>
        <a class="navhover" href="#projects">Projekte</a>
        <a class="navhover" href="#contact">Kontakt</a>
      </nav>
    </header>

    <main class="mx-auto px-4 py-8">
      <section
        class="max-w-4xl mx-auto flex flex-col justify-center items-center"
      >
        <div
          class="flex flex-col sm:flex-row gap-4 justify-center items-center w-full max-w-2xl"
        >
          <div class="relative w-full">
            <input
              type="text"
              name="location"
              id="locationInput"
              class="block py-2.5 px-0 w-full text-sm text-black border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-blue-600 peer"
              placeholder=" "
              required
            />
            <label
              for="locationInput"
              class="peer-focus:font-medium absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left peer-focus:left-0 peer-focus:text-blue-600 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >
              Gib deine Stadt ein
            </label>
          </div>

          <button
            onclick="fetchlocation()"
            type="button"
            class="px-6 py-3 h-15 border-2 flex justify-between items-center border-purple-500 text-purple-400 font-bold rounded-xl hover:bg-purple-500 hover:text-white duration-700 ease-in-out transition-all"
          >
            Wetter abrufen
          </button>
        </div>
      </section>

      <section class="container mt-10">
        <div class="parent">
          <div
            class="div1 flex flex-col justify-center items-center"
            id="locationOutput"
          ></div>
          <div class="div2 flex flex-col gap-4" id="history">2</div>
          <div
            class="div5 border-l-2 border-gray-300 pl-2 text-center flex flex-col gap-4"
            id="topFive"
          >
            5
          </div>
        </div>
      </section>
    </main>

    <div
      id="weatherModal"
      class="hidden w-full fixed inset-0 z-50 bg-black/60 flex justify-center items-center overflow-y-auto py-6 px-4"
      onclick="closeModal()"
    >
      <div
        class="relative mx-auto w-[92%] max-w-sm"
        onclick="event.stopPropagation()"
      >
        <button
          type="button"
          onclick="closeModal()"
          class="absolute -top-4 right-0 z-20 w-10 h-10 rounded-full bg-white text-black font-bold shadow-md"
        >
          ×
        </button>

        <div id="modalContent"></div>
      </div>
    </div>

    <footer class="container bg-gray-800 text-white p-4 text-center mt-12">
      <p>&copy; 2026 Kuscher Michael</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
